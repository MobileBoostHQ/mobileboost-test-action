name: 'Trigger MobileBoost Tests'
description: 'Uploads build and PR instructions to the MobileBoost platform.'
inputs:
  organisation-id: 
    description: 'Organisation identifier'
    required: true
  app-path: 
    description: 'Path to the build file (.apk for Android, .ipa or .zip for iOS)'
    required: true
  platform:
    description: 'App platform: either Android or iOS'
    required: false
    
runs:
  using: "composite"
  steps:
    - name: Upload to MobileBoost
      shell: bash
      env:
        API_URL: 'https://api.mobileboost.io/builds'
        ORG_ID: ${{ inputs.organisation-id }}
        APP_PATH: ${{ inputs.app-path }}
        PLATFORM: ${{ inputs.platform }}
        EVENT_PATH: ${{ github.event_path }}
        REPO: ${{ github.repository }}
        COMMIT: ${{ github.event.pull_request.head.sha }}
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_BODY=$(jq -r '.pull_request.body // empty' < "$EVENT_PATH")

        curl -X POST "$API_URL" \
          -F "organisation_id=$ORG_ID" \
          -F "repo_full_path=$REPO" \
          -F "commit_sha=$COMMIT" \
          -F "pr_body=$PR_BODY" \
          -F "upload_file=@$APP_PATH" \
          -F "platform=$PLATFORM"
